<!DOCTYPE html>

<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        
        <div id="auth-screen" class="glass rounded-3xl shadow-2xl p-8 text-center animate-fade-in">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Student Name</label>

                    <datalist id="name-suggestions"></datalist>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Class</label>

                </div>
                <button onclick="startGameHub()" id="start-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:scale-105">
                    START ADVENTURE
                </button>
                <p id="loading-status" class="text-xs text-center text-indigo-500 font-medium animate-pulse">Loading profiles from database...</p>
            </div>
        </div>

        <div id="menu-screen" class="hidden animate-fade-in">
            <div class="glass rounded-3xl p-6 mb-6 flex justify-between items-center shadow-lg">
                <div>
                    <h2 class="text-xl font-bold text-indigo-800" id="display-name">Hi, Student!</h2>
                    <p class="text-sm text-indigo-500" id="display-class">Class: -</p>

                        <i class="fas fa-sign-out-alt"></i> Not you? Change Player
                    </button>
                </div>
                <div class="flex gap-2">
                    <button onclick="showLeaderboard()" class="bg-yellow-400 hover:bg-yellow-500 text-indigo-900 px-4 py-2 rounded-full font-bold shadow transition">
                        <i class="fas fa-trophy"></i> Leaderboard
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <button onclick="initGame('guessing')" class="p-6 glass rounded-3xl text-left hover:bg-indigo-50 transition group border-b-4 border-orange-400">
                    <div class="text-4xl mb-4 text-orange-500"><i class="fas fa-search"></i></div>
                    <h3 class="text-xl font-bold mb-1">Guessing Word</h3>
                    <p class="text-sm text-gray-500">Guess the word based on hints.</p>
                </button>
                
                <button onclick="initGame('puzzle')" class="p-6 glass rounded-3xl text-left hover:bg-indigo-50 transition group border-b-4 border-blue-400">
                    <div class="text-4xl mb-4 text-blue-500"><i class="fas fa-puzzle-piece"></i></div>
                    <h3 class="text-xl font-bold mb-1">Word Scramble</h3>
                    <p class="text-sm text-gray-500">Unscramble the messy letters.</p>
                </button>

                <button onclick="initGame('synonym')" class="p-6 glass rounded-3xl text-left hover:bg-indigo-50 transition group border-b-4 border-purple-400">
                    <div class="text-4xl mb-4 text-purple-500"><i class="fas fa-link"></i></div>
                    <h3 class="text-xl font-bold mb-1">Synonyms</h3>
                    <p class="text-sm text-gray-500">Find words with the SAME meaning.</p>
                </button>

                <button onclick="initGame('antonym')" class="p-6 glass rounded-3xl text-left hover:bg-indigo-50 transition group border-b-4 border-red-400">
                    <div class="text-4xl mb-4 text-red-500"><i class="fas fa-not-equal"></i></div>
                    <h3 class="text-xl font-bold mb-1">Antonyms</h3>
                    <p class="text-sm text-gray-500">Find words with the OPPOSITE meaning.</p>
                </button>
            </div>
        </div>

        <div id="game-arena" class="hidden glass rounded-3xl shadow-2xl p-6 md:p-8 animate-fade-in">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <button onclick="backToMenu()" class="text-gray-500 hover:text-red-500 font-semibold"><i class="fas fa-arrow-left"></i> Back</button>
                <div class="text-center">
                    <h2 id="game-title" class="text-2xl font-bold text-indigo-700 uppercase tracking-wider">Game</h2>
                    <p id="game-subtitle" class="text-xs text-gray-400">Answer as many as you can!</p>
                </div>
                <div id="timer-box" class="bg-red-500 text-white px-4 py-2 rounded-lg font-mono text-xl font-bold shadow-inner">
                    03:00
                </div>
            </div>

            <div id="question-container" class="custom-scroll space-y-6 mb-8 max-h-[60vh] overflow-y-auto px-2">
            </div>

            <div class="flex flex-col items-center gap-4">
                <button id="check-btn" onclick="finishGame()" class="hidden w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg transition-all">
                    CHECK ANSWERS & SEE SCORE
                </button>
                <div id="final-score" class="hidden text-center p-6 bg-indigo-50 rounded-2xl w-full border-2 border-dashed border-indigo-200">
                    <p class="text-gray-600">Your Score:</p>
                    <h2 id="score-val" class="text-5xl font-black text-indigo-600">0/0</h2>
                    <p id="praise-text" class="text-sm font-medium mt-2 mb-4 text-indigo-500 italic"></p>
                    <p id="save-status" class="text-xs text-gray-400 mb-4">Saving to Cloud...</p>
                    <button onclick="showLeaderboard()" class="bg-yellow-400 hover:bg-yellow-500 text-indigo-900 px-6 py-2 rounded-full font-bold shadow transition">
                        View Leaderboard
                    </button>
                </div>
            </div>
        </div>

        <div id="leaderboard-screen" class="hidden glass rounded-3xl shadow-2xl p-8 animate-fade-in">

                <h2 class="text-3xl font-bold text-indigo-700"><i class="fas fa-crown text-yellow-500"></i> Leaderboard</h2>
                <button onclick="backToMenu()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-full font-bold transition">CLOSE</button>

<thead class="bg-indigo-600 text-white sticky top-0 z-10">

                            <th class="p-4">Game</th>

                    </tbody>
                </table>
            </div>
        </div>

                const checkDuplicate = new Map();
                
                for (const item of data) {
                    if(!checkDuplicate.has(item.name.toLowerCase())){
                        checkDuplicate.set(item.name.toLowerCase(), true);
                        uniqueStudents.push({
    name: item.name.toUpperCase(), // Paksa nama menjadi HURUF BESAR
    class: item.cls 
});
                    }
                }
                
                studentDatabase = uniqueStudents;
                
                // Masukkan nama ke dalam dropdown
                studentDatabase.forEach(profile => {
                    const option = document.createElement('option');
                    option.value = profile.name;
                    datalist.appendChild(option);
                });

                loadingText.innerText = "Profiles loaded successfully!";
                loadingText.classList.replace('text-indigo-500', 'text-green-500');
                loadingText.classList.remove('animate-pulse');
                
            } catch (error) {
                console.error("Error fetching data:", error);
                loadingText.innerText = "Warning: Could not load profiles. Proceed manually.";
                loadingText.classList.replace('text-indigo-500', 'text-red-500');
                loadingText.classList.remove('animate-pulse');
            } finally {
                startBtn.disabled = false;
                startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        };

        // Fungsi ini dipanggil setiap kali pelajar menaip nama
        function autoFillClass() {
            const inputName = document.getElementById('student-name').value.trim().toLowerCase();
            const foundProfile = studentDatabase.find(p => p.name.toLowerCase() === inputName);
            
            if (foundProfile) {
                // Jika nama dijumpai dalam rekod, isi kelas secara automatik
                document.getElementById('student-class').value = foundProfile.class;
            }
        }

        function startGameHub() {
            const name = document.getElementById('student-name').value.trim();
            const cls = document.getElementById('student-class').value.trim();
            
            if(!name || !cls) return alert("Please enter your name and class first!");

            studentInfo = { name, class: cls };
            document.getElementById('display-name').innerText = "Hi, " + name + "!";
            document.getElementById('display-class').innerText = "Class: " + cls;
            
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        }

        function logout() {
            studentInfo = { name: '', class: '' };
            document.getElementById('student-name').value = '';
            document.getElementById('student-class').value = '';

            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
        }

        function backToMenu() {
            clearInterval(currentTimer);
            document.getElementById('game-arena').classList.add('hidden');
            document.getElementById('leaderboard-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        }

        function initGame(type) {
            currentGameType = type;
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-arena').classList.remove('hidden');
            document.getElementById('check-btn').classList.add('hidden');
            document.getElementById('final-score').classList.add('hidden');
            
            const container = document.getElementById('question-container');
            container.innerHTML = "";
            
            let title = "";
            if(type === 'guessing') title = "Guess the Word";
            if(type === 'puzzle') title = "Word Scramble";
            if(type === 'synonym') title = "Synonyms (Same Meaning)";
            if(type === 'antonym') title = "Antonyms (Opposite Meaning)";
            
            document.getElementById('game-title').innerText = title;

            const questions = gameData[type] || [];
            questions.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-2xl border-l-4 border-indigo-400 shadow-sm";
                div.innerHTML = `
                    <p class="font-bold text-gray-700 mb-3">${index + 1}. ${item.q}</p>
                    <input type="text" class="game-input w-full p-3 rounded-lg bg-gray-50 border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-400" placeholder="Type your answer here..." data-answer="${item.a}">
                `;
                container.appendChild(div);
            });

            startTimer(180); // 3 minit
        }

        function startTimer(seconds) {
            timeLeft = seconds;
            clearInterval(currentTimer);
            
            currentTimer = setInterval(() => {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timer-box').innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 10) {
                    document.getElementById('timer-box').classList.add('animate-pulse', 'bg-red-600');
                } else {
                    document.getElementById('timer-box').classList.remove('animate-pulse', 'bg-red-600');
                }

                if (timeLeft <= 0) {
                    clearInterval(currentTimer);
                    timeUp();
                }
                timeLeft--;
            }, 1000);
        }

        function timeUp() {
            document.getElementById('timer-box').innerText = "TIME UP!";
            const inputs = document.querySelectorAll('.game-input');
            inputs.forEach(input => input.disabled = true);
            document.getElementById('check-btn').classList.remove('hidden');
            alert("TIME'S UP! Check your answers below.");
        }

        function finishGame() {
            const inputs = document.querySelectorAll('.game-input');
            let score = 0;
            let total = inputs.length;

            inputs.forEach(input => {
                const userAns = input.value.trim().toLowerCase();
                const correctAns = input.dataset.answer.toLowerCase();

                if (correctAns.includes('|')) {
                    const validAnswers = correctAns.split('|');
                    if(validAnswers.includes(userAns)) {
                        score++;
                        input.classList.add('bg-green-100', 'border-green-500');
                    } else {
                        input.classList.add('bg-red-100', 'border-red-500');
                        showHint(input, correctAns);
                    }
                } else {
                    if(userAns === correctAns) {
                        score++;
                        input.classList.add('bg-green-100', 'border-green-500');
                    } else {
                        input.classList.add('bg-red-100', 'border-red-500');
                        showHint(input, correctAns);
                    }
                }
            });

            document.getElementById('score-val').innerText = `${score}/${total}`;
            document.getElementById('final-score').classList.remove('hidden');
            document.getElementById('check-btn').classList.add('hidden');
            
            const praise = score === total ? "Excellent! You're a Master! 🌟" : score > 0 ? "Good Job! Keep Practicing! 💪" : "Try again, you can do it! 📚";
            document.getElementById('praise-text').innerText = praise;

            saveScoreToSheets(studentInfo.name, studentInfo.class, score, total, currentGameType);
        }

        function showHint(inputElement, correctAns) {
            const hint = document.createElement('span');
            hint.className = "text-xs text-green-600 block mt-1 font-bold";
            hint.innerText = "Correct: " + correctAns.replace(/\|/g, ' or ');
            inputElement.parentNode.appendChild(hint);
        }

        async function saveScoreToSheets(name, cls, score, total, type) {
            const statusText = document.getElementById('save-status');
            statusText.innerText = "Saving to Cloud...";
            statusText.classList.replace('text-gray-400', 'text-yellow-500');

            const data = { name, class: cls, score, total, type };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Ditukar ke text/plain untuk elak halangan CORS
                    body: JSON.stringify(data)
                });
                statusText.innerText = "✅ Saved to Leaderboard!";
                statusText.classList.replace('text-yellow-500', 'text-green-500');
            } catch (error) {
                console.error(error);
                statusText.innerText = "❌ Failed to save. Please check connection.";
                statusText.classList.replace('text-yellow-500', 'text-red-500');
            }
        }

async function showLeaderboard() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-arena').classList.add('hidden');
            document.getElementById('leaderboard-screen').classList.remove('hidden');
            
            const body = document.getElementById('leaderboard-body');
            body.innerHTML = "<tr><td colspan='6' class='p-8 text-center text-indigo-500 font-bold animate-pulse'><i class='fas fa-spinner fa-spin mr-2'></i> Fetching live scores...</td></tr>";

            try {
                const response = await fetch(SCRIPT_URL);
                const scores = await response.json();
                
                if(scores.length === 0) {
                    body.innerHTML = "<tr><td colspan='6' class='p-8 text-center text-gray-400'>No records yet. Be the first to play!</td></tr>";
                    return;
                }

                // 1. KUMPULKAN DATA MENGIKUT NAMA PELAJAR
                const studentData = {};
                
                scores.forEach(s => {
                    // Gunakan gabungan Nama dan Kelas sebagai ID Unik
                    const key = s.name.toUpperCase() + "_" + s.cls.toUpperCase();
                    
                    if (!studentData[key]) {
                        studentData[key] = {
                            name: s.name.toUpperCase(),
                            cls: s.cls,
                            games: {}
                        };
                    }
                    
                    // Jika pelajar main game yang sama banyak kali, ambil markah paling tinggi sahaja
                    if (!studentData[key].games[s.type] || s.score > studentData[key].games[s.type].score) {
                        studentData[key].games[s.type] = { score: s.score, total: s.total };
                    }
                });

                // 2. KIRA JUMLAH KESELURUHAN (GRAND TOTAL)
                const leaderboard = Object.values(studentData).map(student => {
                    let grandScore = 0;
                    let grandMax = 0;
                    const gameList = [];
                    
                    for (const [gameName, gameData] of Object.entries(student.games)) {
                        grandScore += gameData.score;
                        grandMax += gameData.total;
                        gameList.push({ name: gameName, score: gameData.score, total: gameData.total });
                    }
                    
                    return {
                        ...student,
                        gameList,
                        grandScore,
                        grandMax
                    };
                });

                // 3. SUSUN MENGIKUT MARKAH TERTINGGI (RANKING)
                leaderboard.sort((a, b) => b.grandScore - a.grandScore);

                // 4. BINA PAPARAN JADUAL
                body.innerHTML = "";
                
                leaderboard.slice(0, 50).forEach((student, index) => {
                    let rankIcon = `#${index+1}`;
                    if(index === 0) rankIcon = `🥇`;
                    if(index === 1) rankIcon = `🥈`;
                    if(index === 2) rankIcon = `🥉`;

                    const gamesCount = student.gameList.length;

                    student.gameList.forEach((game, gIndex) => {
                        // Semak jika ini baris pertama atau baris terakhir untuk pelajar tersebut
                        const isFirstRow = gIndex === 0;
                        const isLastRow = gIndex === (gamesCount - 1);

                        // Hanya paparkan Rank, Nama, dan Kelas pada baris pertama
                        const rankText = isFirstRow ? rankIcon : '';
                        const nameText = isFirstRow ? student.name : '';
                        const classText = isFirstRow ? student.cls : '';
                        
                        // Hanya paparkan Grand Total pada baris terakhir
                        const totalHtml = isLastRow ? `<span class="bg-indigo-600 text-white px-3 py-1 rounded-full font-bold shadow-md">${student.grandScore}/${student.grandMax}</span>` : '';

                        // Tambahkan garisan tebal pada baris terakhir untuk memisahkan antara pelajar
                        const rowClass = isLastRow ? 'border-b-2 border-indigo-200' : 'border-b border-gray-50';

                        const row = `
                            <tr class="${rowClass} hover:bg-gray-50 transition">
                                <td class="p-4 font-bold text-indigo-600 text-lg">${rankText}</td>
                                <td class="p-4 font-bold uppercase text-gray-800">${nameText}</td>
                                <td class="p-4 text-sm text-gray-500">${classText}</td>
                                <td class="p-4 text-xs uppercase font-bold text-gray-500">${game.name}</td>
                                <td class="p-4 text-center font-semibold text-gray-700">${game.score}/${game.total}</td>
                                <td class="p-4 text-center">${totalHtml}</td>
                            </tr>
                        `;
                        body.innerHTML += row;
                    });
                });
                
            } catch (error) {
                console.error(error);
                body.innerHTML = "<tr><td colspan='6' class='p-8 text-center text-red-500'><i class='fas fa-exclamation-triangle'></i> Failed to load data. Please refresh.</td></tr>";
            }
        }
    </script>
</body>
