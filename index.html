<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Creation Game</title>

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f0f4f8;
        }
        h1 {
            color: #4A5568;
        }
        .input-field {
            border-color: #63B3ED;
        }
        .btn-submit {
            background-color: #38B2AC;
        }
        .btn-check {
            background-color: #ED8936;
        }
        .score {
            color: #2F855A;
        }
        .word-list {
            color: #DD6B20;
        }
        .credential-word {
            font-size: 1.8rem;
            color: #2B6CB0;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center h-screen">

    <!-- PERKATAAN UTAMA -->
    <div class="credential-word">
        SUPERCALIFRAGILISTICEXPIALIDOSOUS
    </div>

    <!-- CONTAINER -->
    <div class="bg-white p-8 rounded-lg shadow-lg w-96">
        <h1 class="text-3xl font-bold mb-4 text-center">Word Creation Game</h1>

        <input type="text" id="nameInput" class="border p-2 w-full mb-4 input-field" placeholder="Your Name">
        <input type="text" id="classInput" class="border p-2 w-full mb-4 input-field" placeholder="Your Class">

        <input type="text" id="wordInput" class="border p-2 w-full mb-4 input-field" placeholder="Enter a word...">

        <button id="submitWord" class="text-white p-2 rounded btn-submit w-full mb-2 hover:bg-teal-600 transition">
            Submit
        </button>

        <button id="checkAnswers" class="text-white p-2 rounded btn-check w-full hidden hover:bg-orange-600 transition">
            Semak Jawapan
        </button>

        <div id="score" class="mt-4 score hidden text-xl font-semibold text-center"></div>
        <div id="wordList" class="mt-4 word-list text-lg font-medium"></div>
    </div>

<script>
    const originalWord = "SUPERCALIFRAGILISTICEXPIALIDOSOUS";

    const allSubmittedWords = [];   // simpan semua (betul + salah)
    const validWords = new Set();   // simpan yang betul sahaja

    document.getElementById('submitWord').addEventListener('click', () => {
        const wordInput = document.getElementById('wordInput').value.toUpperCase().trim();

        if (wordInput.length < 4) {
            alert("Minimum 4 huruf!");
            return;
        }

        // simpan semua tanpa semak dulu
        allSubmittedWords.push(wordInput);

        document.getElementById('wordInput').value = '';

        // papar butang semak bila ada input
        document.getElementById('checkAnswers').classList.remove('hidden');
    });

    document.getElementById('checkAnswers').addEventListener('click', () => {

        validWords.clear();

        // tapis perkataan betul sahaja
        allSubmittedWords.forEach(word => {
            if (isValidWord(word, originalWord)) {
                validWords.add(word);
            }
        });

        // kira markah
        const score = validWords.size;

        document.getElementById('score').innerText = `Score: ${score}`;
        document.getElementById('score').classList.remove('hidden');

        // papar hanya yang betul
        document.getElementById('wordList').innerText =
            'Valid Words: ' + [...validWords].join(', ');
    });

    function isValidWord(word, original) {
        const originalLetters = original.split('');

        for (const letter of word) {
            const index = originalLetters.indexOf(letter);
            if (index === -1) return false;
            originalLetters.splice(index, 1);
        }

        return true;
    }
</script>

</body>
</html>
